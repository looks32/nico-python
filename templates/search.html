<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Scrapper</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css"
    />
  </head>
  <body>
    <main class="container">
      <h1>Search Results for {{keyword}} :</h1>
      <figure>
        {% if jobs %}
        <table class="striped">
          <thead>
            <th>제목</th>
            <th>회사명</th>
            <th>설명</th>
            <th>링크</th>
          </thead>
          <tbody>
            {% for job in jobs %}
            <tr>
              <td>{{job.title}}</td>
              <td>{{job.company_name}}</td>
              <td>{{job.description}}</td>
              <td>
                <a
                  href="{{job.link}}"
                  target="_blank"
                  title="{{ job.title }} 바로가기"
                  >공고 보러가기</a
                >
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        {% else %} 검색결과가 없습니다. {% endif %}
      </figure>
    </main>
  </body>
</html>
