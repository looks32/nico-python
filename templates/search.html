<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Scrapper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <header>
      <a href="/" class="back">뒤로가기</a>
      <h1>
        Search Results for
        <span class="keyword">
          {% if jobs %} All JOBS {% else %} {{keyword}} {% endif %}
        </span>
      </h1>
    </header>
    <main class="search_area">
      <figure>
        {% if jobs %}
        <table>
          <thead>
            <th>직군</th>
            <th>회사명</th>
            <th>설명</th>
            <th>링크</th>
          </thead>
          <tbody>
            {% for job in jobs %}
            <tr>
              <td>{{job.title}}</td>
              <td>{{job.company_name}}</td>
              <td>{{job.description}}</td>
              <td>
                <a
                  href="{{job.link}}"
                  target="_blank"
                  title="{{ job.title }} 바로가기"
                  >Link</a
                >
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        {% else %}
        <div class="no_result">검색결과가 없습니다.</div>
        {% endif %}
      </figure>
      <footer>
        <div class="inner">
          <div>created by Dang</div>
          <div>Copyright (c) 2026 Job Scrapper All Right Reserved.</div>
        </div>
      </footer>
    </main>
  </body>
</html>
